# helm values for kube-prometheus-stack
# install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install prometheus prometheus-community/kube-prometheus-stack -n monitoring -f prometheus-values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: 1000m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    # scrape interval — 30s is fine for a homelab
    scrapeInterval: 30s
    evaluationInterval: 30s

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m

grafana:
  enabled: false  # deployed separately with own values

# node exporter for host metrics
nodeExporter:
  enabled: true

# kube-state-metrics
kubeStateMetrics:
  enabled: true
